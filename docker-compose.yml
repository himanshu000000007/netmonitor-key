services:
  db:
    image: postgres:16-alpine
    container_name: netmonitor-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: netmonitor
      POSTGRES_USER: netadmin
      POSTGRES_PASSWORD: netpass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netadmin -d netmonitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./app
    image: himanshubhuakr545/netmonitor-web:latest
    container_name: netmonitor-web
    restart: unless-stopped
    ports:
      - "80:5000"
    environment:
      DB_HOST: db
      DB_NAME: netmonitor
      DB_USER: netadmin
      DB_PASSWORD: netpass123
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  # Container-level CPU/RAM metrics collect karta hai - Prometheus ise scrape karega
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: netmonitor-cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8081:8080"

  # Metrics collect + store karta hai app aur containers dono se
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: netmonitor-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - web
      - cadvisor

  # Dashboards - Prometheus ke data ko graphs mein dikhayega
  grafana:
    image: grafana/grafana:11.1.0
    container_name: netmonitor-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
