name: CI/CD - Build and Deploy Network Monitor

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/netmonitor-web:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/netmonitor-key
            git pull

            # Docker Compose wali app update karo
            docker compose pull web
            docker compose up -d web

            # k3s wale pods bhi update karo (naya image pull + restart)
            sudo k3s kubectl set image deployment/netmonitor-web \
              web=${{ secrets.DOCKERHUB_USERNAME }}/netmonitor-web:latest \
              -n netmonitor
            sudo k3s kubectl rollout restart deployment/netmonitor-web -n netmonitor
