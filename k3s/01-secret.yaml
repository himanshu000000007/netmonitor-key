# Secret - Postgres credentials. stringData use kiya hai taaki plain text
# likh sakein (Kubernetes khud base64 encode kar lega). Real production mein
# isko Sealed Secrets ya AWS Secrets Manager se manage karte hain, sikhne ke
# liye ye tarika theek hai.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: netmonitor
type: Opaque
stringData:
  POSTGRES_DB: netmonitor
  POSTGRES_USER: netadmin
  POSTGRES_PASSWORD: netpass123
