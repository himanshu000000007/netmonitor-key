# Deployment - Flask app ke 2 replicas chalayenge (Docker Compose mein
# hamesha sirf 1 hota tha - ye Kubernetes ka fayda hai, load balancing +
# ek pod crash ho to doosra already chal raha hota hai, downtime nahi hota)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netmonitor-web
  namespace: netmonitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netmonitor-web
  template:
    metadata:
      labels:
        app: netmonitor-web
    spec:
      containers:
        - name: web
          # IMPORTANT: apna Docker Hub username daalo yahan, image push karne ke baad
          image: DOCKERHUB_USERNAME/netmonitor-web:latest
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: postgres   # Service ka naam - yehi Kubernetes DNS resolve karta hai
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DB_PORT
              value: "5432"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
